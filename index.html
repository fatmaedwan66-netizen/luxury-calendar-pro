<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Calendar</title>

<style>
body {
  background: #f3d9df;
  display: flex;
  justify-content: center;
  padding: 40px;
  font-family: Georgia, serif;
}

.calendar {
  background: #f9e4ea;
  padding: 30px;
  border-radius: 30px;
  width: 380px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.18);
}

.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
}

.arrow {
  background: linear-gradient(135deg, #8C6A1F, #C6A75E, #B8963A);
  border: none;
  color: white;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  font-size: 20px;
  cursor: pointer;
  transition: 0.3s ease;
}

.arrow:hover {
  transform: scale(1.1);
}

h2 {
  background: linear-gradient(135deg, #8C6A1F, #C6A75E, #B8963A);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-size: 26px;
  font-weight: bold;
  text-align: center;
  flex: 1;
}

.days, .dates {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
}

.days div {
  font-weight: bold;
  margin-bottom: 12px;
  color: #8C6A1F;
  font-size: 15px;
}

.dates div {
  padding: 14px;
  margin: 6px;
  background: #ffc0cb;
  border-radius: 18px;
  cursor: pointer;
  transition: 0.3s ease;
  border: 2px solid #B8963A;
  font-size: 16px;
}

.dates div:hover {
  transform: scale(1.1);
}

.today {
  background: #add8e6 !important;
}

.selected {
  background: #8C6A1F !important;
  color: white;
}
</style>
</head>

<body>

<div class="calendar">

  <div class="nav">
    <button class="arrow" id="prev">&#10094;</button>
    <h2 id="monthYear"></h2>
    <button class="arrow" id="next">&#10095;</button>
  </div>

  <div class="days">
    <div>M</div><div>T</div><div>W</div>
    <div>T</div><div>F</div><div>S</div><div>S</div>
  </div>

  <div class="dates" id="dates"></div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

const monthYear = document.getElementById("monthYear");
const datesContainer = document.getElementById("dates");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");

let currentDate = new Date();

const months = [
  "January","February","March","April",
  "May","June","July","August",
  "September","October","November","December"
];

function renderCalendar() {

  datesContainer.innerHTML = "";

  const month = currentDate.getMonth();
  const year = currentDate.getFullYear();

  monthYear.textContent = `${months[month]} ${year}`;

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const startDay = firstDay === 0 ? 6 : firstDay - 1;

  for (let i = 0; i < startDay; i++) {
    datesContainer.appendChild(document.createElement("div"));
  }

  for (let day = 1; day <= daysInMonth; day++) {

    const dateDiv = document.createElement("div");
    dateDiv.textContent = day;

    const today = new Date();

    if (
      day === today.getDate() &&
      month === today.getMonth() &&
      year === today.getFullYear()
    ) {
      dateDiv.classList.add("today");
    }

    dateDiv.addEventListener("click", function() {
      document.querySelectorAll(".dates div").forEach(d => d.classList.remove("selected"));
      dateDiv.classList.add("selected");
    });

    datesContainer.appendChild(dateDiv);
  }
}

prevBtn.addEventListener("click", function() {
  currentDate.setMonth(currentDate.getMonth() - 1);
  renderCalendar();
});

nextBtn.addEventListener("click", function() {
  currentDate.setMonth(currentDate.getMonth() + 1);
  renderCalendar();
});

renderCalendar();

});
</script>

</body>
</html>
